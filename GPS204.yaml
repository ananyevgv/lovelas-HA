type: picture-elements
image: /local/picture/GPS204.jpg
elements:
  - type: state-icon
    style:
      top: 23%
      left: 29.3%
      "--mdc-icon-size": 12px
    icon: mdi:circle
    entity: sensor.gps204v32604026c9ojsj5zse_voltage
    card_mod:
      style:
        state-badge $: |
          ha-state-icon {
          {% if (states(config.entity)|int(default=0)) > 50 %}
            color: green !important;
          {% else %}
          color: red;
          {% endif %}
          }
