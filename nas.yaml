  - type: horizontal-stack
    cards:
      - type: custom:flex-horseshoe-card
        entities:
          - entity: sensor.yar125a_volume_1_used_space
            decimals: 1
            icon: mdi:harddisk
            name: NAS
            area: volume_1
          - entity: sensor.yar125a_volume_1_volume_used
            decimals: 1
          - entity: sensor.nas_volume_1_total_size
            decimals: 1
        scaleTickSize: 50
        show:
          scale_tickmarks: true
        layout:
          icons:
            - id: 0
              entity_index: 0
              xpos: 50
              ypos: 20
              size: 3
          hlines:
            - id: 0
              xpos: 50
              ypos: 48
              length: 80
              styles:
                - opacity: 0.5;
          circles:
            - id: 0
              xpos: 50
              ypos: 61
              radius: 3
              styles:
                - fill: var(--primary-text-color);
                - opacity: 0.5;
          states:
            - id: 0
              entity_index: 0
              xpos: 50
              ypos: 40
              styles:
                - font-size: 3em;
                - opacity: 0.9;
            - id: 0
              entity_index: 1
              xpos: 46
              ypos: 64
              styles:
                - font-size: 1.7em;
                - text-anchor: end;
            - id: 2
              entity_index: 2
              xpos: 54
              ypos: 64
              styles:
                - font-size: 1.7em;
                - text-anchor: start;
          names:
            - id: 0
              entity_index: 0
              xpos: 50
              ypos: 100
          areas:
            - id: 0
              entity_index: 0
              xpos: 50
              ypos: 80
        horseshoe_scale:
          min: 0
          max: 215
        color_stops:
          "0": "#FFF6E3"
          "215": "#FF8C06"
      - type: custom:flex-horseshoe-card
        entities:
          - entity: sensor.yar125a_volume_2_used_space
            decimals: 1
            icon: mdi:harddisk
            name: NAS
            area: volume_2
          - entity: sensor.yar125a_volume_2_volume_used
            decimals: 1
          - entity: sensor.yar125a_volume_2_total_size
            decimals: 1
        scaleTickSize: 50
        show:
          scale_tickmarks: true
        layout:
          icons:
            - id: 0
              entity_index: 0
              xpos: 50
              ypos: 20
              size: 3
          hlines:
            - id: 0
              xpos: 50
              ypos: 48
              length: 80
              styles:
                - opacity: 0.5;
          circles:
            - id: 0
              xpos: 50
              ypos: 61
              radius: 3
              styles:
                - fill: var(--primary-text-color);
                - opacity: 0.5;
          states:
            - id: 0
              entity_index: 0
              xpos: 50
              ypos: 40
              styles:
                - font-size: 3em;
                - opacity: 0.9;
            - id: 0
              entity_index: 1
              xpos: 46
              ypos: 64
              styles:
                - font-size: 1.7em;
                - text-anchor: end;
            - id: 2
              entity_index: 2
              xpos: 54
              ypos: 64
              styles:
                - font-size: 1.7em;
                - text-anchor: start;
          names:
            - id: 0
              entity_index: 0
              xpos: 50
              ypos: 100
          areas:
            - id: 0
              entity_index: 0
              xpos: 50
              ypos: 80
        horseshoe_scale:
          min: 0
          max: 215
        color_stops:
          "0": "#FFF6E3"
          "215": "#FF8C06"
  - type: horizontal-stack
    cards:
      - type: gauge
        entity: sensor.memory_use
        min: 0
        max: 4096
        severity:
          green: 0
          yellow: 2048
          red: 3062
        needle: true
        name: VM Mem Use
      - type: custom:mini-graph-card
        entities:
          - sensor.processor_use
        name: VM CPU
        color_thresholds:
          - value: 0
            color: "#00ff8a"
          - value: 80
            color: "#D64542"
        line_width: 8
        font_size: 75
        hour24: true
      - type: gauge
        entity: sensor.disk_use
        min: 0
        max: 120
        severity:
          green: 0
          yellow: 50
          red: 70
        needle: true
        name: VM HDD Use
